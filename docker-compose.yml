version: '3.8'

services:
  app:
    build: ./backend
    container_name: corporate_travel_app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db


  db:
    image: postgres:15
    container_name: corporate_travel_db
    environment:
      POSTGRES_DB: travel_orders
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: subaru
    ports:
      - "3725:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    container_name: corporate_travel_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  db_data:
